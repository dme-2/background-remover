version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: background-remover-db-prod
    environment:
      POSTGRES_DB: background_remover
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: background-remover-cache-prod
    restart: always
    volumes:
      - redis_data_prod:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: background-remover-api-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/background_remover
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      IMAGE_PROCESSOR_URL: http://image-processor:8000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  image-processor:
    build:
      context: ./image-processor
      dockerfile: Dockerfile
    container_name: background-remover-processor-prod
    environment:
      PORT: 8000
      WORKERS: 8
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: background-remover-web-prod
    environment:
      REACT_APP_API_URL: ${API_URL}
    restart: always
    expose:
      - "3000"

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  default:
    name: background-remover-network-prod
